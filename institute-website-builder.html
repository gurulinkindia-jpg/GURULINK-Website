<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Institute Website Builder</title>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #65758b;
      --line: #d7dde7;
      --paper: #f7f8fb;
      --panel: #ffffff;
      --brand: #2563eb;
      --brand-dark: #1e40af;
      --accent: #f59e0b;
      --success: #138a5b;
      --shadow: 0 18px 48px rgba(31, 41, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
    }

    .builder {
      background: var(--panel);
      border-right: 1px solid var(--line);
      height: 100vh;
      overflow: auto;
      padding: 24px;
    }

    .builder h1 {
      margin: 0 0 6px;
      font-size: 26px;
      letter-spacing: 0;
    }

    .builder .subhead {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.45;
    }

    .section {
      padding: 18px 0;
      border-top: 1px solid var(--line);
    }

    .section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #38475c;
    }

    label {
      display: block;
      margin-bottom: 14px;
      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      margin-top: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: flex;
      gap: 10px;
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.78), #fff 28%);
      padding-top: 18px;
      margin-top: 4px;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      min-height: 44px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn.primary {
      color: #fff;
      background: var(--brand);
      flex: 1;
    }

    .btn.secondary {
      color: var(--brand-dark);
      background: #e8f0ff;
    }

    .btn:hover {
      filter: brightness(0.97);
    }

    .preview-wrap {
      height: 100vh;
      overflow: auto;
      background: #e8edf5;
      padding: 28px;
    }

    .preview-label {
      max-width: 1120px;
      margin: 0 auto 10px;
      color: #526173;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .site {
      max-width: 1120px;
      margin: 0 auto;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 32px;
      border-bottom: 1px solid rgba(215, 221, 231, 0.9);
      background: #fff;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .brand-small {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .site-links {
      display: flex;
      align-items: center;
      gap: 18px;
      color: #415065;
      font-size: 14px;
      font-weight: 700;
    }

    .site-links a {
      color: inherit;
      text-decoration: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 42%);
      gap: 34px;
      align-items: center;
      padding: 54px 44px 44px;
      background:
        linear-gradient(115deg, rgba(37, 99, 235, 0.11), rgba(245, 158, 11, 0.13)),
        #ffffff;
    }

    .hero h2 {
      margin: 0 0 14px;
      color: #172033;
      font-size: clamp(34px, 4.8vw, 58px);
      line-height: 1.02;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .hero p {
      margin: 0 0 24px;
      color: #4b5d75;
      font-size: 18px;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .site-cta {
      display: inline-flex;
      min-height: 46px;
      padding: 0 18px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-weight: 900;
    }

    .site-cta.alt {
      background: #fff;
      color: var(--brand-dark);
      border: 1px solid var(--line);
    }

    .hero-media {
      aspect-ratio: 4 / 3;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(31, 41, 55, 0.13), rgba(31, 41, 55, 0)),
        #dfe7f3;
      overflow: hidden;
      min-height: 260px;
    }

    .hero-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .placeholder-art {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
      color: #2f4057;
      font-weight: 900;
      text-align: center;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.4) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
        linear-gradient(135deg, #c7d5ea, #f1c56f);
      background-size: 28px 28px, 28px 28px, cover;
    }

    .band {
      padding: 42px 44px;
    }

    .band.tint {
      background: #f7fafc;
    }

    .band h3 {
      margin: 0 0 20px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .course-card,
    .info-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 18px;
    }

    .course-card h4,
    .info-card h4 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .course-card p,
    .info-card p {
      margin: 0;
      color: #5b6c80;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .stat {
      border-left: 4px solid var(--accent);
      background: #fff;
      padding: 15px 16px;
      border-radius: 8px;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      color: var(--brand-dark);
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .contact {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 22px;
      align-items: start;
    }
    .admission-panel {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: 18px;
      align-items: stretch;
    }

    .admission-copy,
    .admission-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 20px;
    }

    .admission-copy p {
      color: #4b5d75;
      line-height: 1.65;
      margin: 0 0 18px;
    }

    .check-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: #43536a;
    }

    .check-list li {
      border-left: 4px solid var(--accent);
      padding: 9px 0 9px 12px;
      background: #f8fafc;
      border-radius: 6px;
      line-height: 1.45;
    }

    .admission-box {
      background: #172033;
      color: #fff;
    }

    .admission-box h4 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .admission-box p {
      color: rgba(255,255,255,0.82);
      line-height: 1.55;
      margin: 0 0 18px;
    }

    .admission-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .admission-actions a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      padding: 0 14px;
      text-decoration: none;
      font-weight: 900;
      background: #fff;
      color: var(--brand-dark);
    }

    .admission-actions a.secondary-link {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.28);
    }

    .contact-list {
      display: grid;
      gap: 10px;
      color: #46576d;
      line-height: 1.55;
    }

    .lead-box {
      background: var(--brand);
      color: #fff;
      border-radius: 8px;
      padding: 22px;
    }

    .lead-box h4 {
      margin: 0 0 9px;
      font-size: 22px;
    }

    .lead-box p {
      margin: 0 0 18px;
      line-height: 1.5;
      color: rgba(255,255,255,0.86);
    }

    .lead-box a {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      color: var(--brand-dark);
      background: #fff;
      border-radius: 8px;
      padding: 0 16px;
      text-decoration: none;
      font-weight: 900;
    }

    .site-footer {
      padding: 20px 44px;
      background: #172033;
      color: #d9e2ef;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .builder,
      .preview-wrap {
        height: auto;
      }

      .builder {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .hero,
      .contact,
      .admission-panel {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .builder,
      .preview-wrap {
        padding: 18px;
      }

      .grid-2,
      .cards,
      .stats {
        grid-template-columns: 1fr;
      }

      .site-nav,
      .hero,
      .band,
      .site-footer {
        padding-left: 22px;
        padding-right: 22px;
      }

      .site-links {
        display: none;
      }

      .hero {
        padding-top: 34px;
      }

      .hero h2 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="builder">
      <h1>Website Builder</h1>
      <p class="subhead">Enter teacher or institute details. The preview updates instantly, then export a complete website file.</p>

      <section class="section">
        <h2>Identity</h2>
        <label>Institute or teacher name
          <input id="name" value="Bright Path Coaching Centre">
        </label>
        <label>Short tagline
          <input id="tagline" value="Smart learning for school and competitive exams">
        </label>
        <label>Main headline
          <textarea id="headline">Build confidence with personal guidance, clear concepts, and regular practice.</textarea>
        </label>
        <div class="grid-2">
          <label>Primary color
            <input id="primaryColor" type="color" value="#2563eb">
          </label>
          <label>Accent color
            <input id="accentColor" type="color" value="#f59e0b">
          </label>
        </div>
        <div class="grid-2">
          <label>Logo
            <input id="logoFile" type="file" accept="image/*">
          </label>
          <label>Hero photo
            <input id="heroFile" type="file" accept="image/*">
          </label>
        </div>
      </section>

      <section class="section">
        <h2>Classes</h2>
        <label>Courses, one per line
          <textarea id="courses">Class 8 to 10 Maths and Science
Class 11 and 12 Physics
Foundation batch for NEET and JEE</textarea>
        </label>
        <div class="grid-2">
          <label>Experience
            <input id="experience" value="10+ Years">
          </label>
          <label>Students taught
            <input id="students" value="1,200+">
          </label>
        </div>
        <label>Success highlight
          <input id="results" value="95% result-focused practice plans">
        </label>
      </section>

      <section class="section">
        <h2>About</h2>
        <label>About text
          <textarea id="about">We provide structured classes, weekly tests, doubt support, and parent updates so every learner knows what to study next.</textarea>
        </label>
        <label>Why choose you, one point per line
          <textarea id="features">Small batches with individual attention
Clear notes and exam-oriented worksheets
Regular tests with performance tracking</textarea>
        </label>
      </section>

      <section class="section">
        <h2>Admission</h2>
        <label>Prospectus title
          <input id="prospectusTitle" value="Admission Prospectus 2026">
        </label>
        <label>Admission details
          <textarea id="admissionInfo">Admissions are open for the new academic session. Students can enquire, collect the prospectus, and complete registration after counselling.</textarea>
        </label>
        <label>Admission steps, one per line
          <textarea id="admissionSteps">Submit enquiry form
Attend counselling or demo class
Complete registration with required documents</textarea>
        </label>
        <label>Required documents / eligibility, one per line
          <textarea id="eligibility">Previous class marksheet
Student Aadhaar or ID proof
Two passport size photographs</textarea>
        </label>
        <label>Online admission form link
          <input id="admissionFormLink" value="https://forms.gle/example-admission-form">
        </label>
        <label>Upload prospectus PDF
          <input id="prospectusFile" type="file" accept="application/pdf,.pdf">
        </label>
      </section>

      <section class="section">
        <h2>Contact</h2>
        <label>Phone or WhatsApp
          <input id="phone" value="+91 98765 43210">
        </label>
        <label>Email
          <input id="email" value="admissions@example.com">
        </label>
        <label>Address
          <textarea id="address">2nd Floor, Main Market Road, Near City Library</textarea>
        </label>
        <label>Admission button text
          <input id="cta" value="Ask for Admission">
        </label>
      </section>

      <div class="actions">
        <button class="btn secondary" id="resetBtn" type="button">Reset</button>
        <button class="btn primary" id="downloadBtn" type="button">Download Website</button>
      </div>
    </aside>

    <section class="preview-wrap">
      <div class="preview-label">Live Preview</div>
      <div id="preview" class="site"></div>
    </section>
  </main>

  <script>
    const defaults = {
      name: "Bright Path Coaching Centre",
      tagline: "Smart learning for school and competitive exams",
      headline: "Build confidence with personal guidance, clear concepts, and regular practice.",
      primaryColor: "#2563eb",
      accentColor: "#f59e0b",
      courses: "Class 8 to 10 Maths and Science\nClass 11 and 12 Physics\nFoundation batch for NEET and JEE",
      experience: "10+ Years",
      students: "1,200+",
      results: "95% result-focused practice plans",
      about: "We provide structured classes, weekly tests, doubt support, and parent updates so every learner knows what to study next.",
      features: "Small batches with individual attention\nClear notes and exam-oriented worksheets\nRegular tests with performance tracking",
      phone: "+91 98765 43210",
      email: "admissions@example.com",
      address: "2nd Floor, Main Market Road, Near City Library",
      cta: "Ask for Admission",
      prospectusTitle: "Admission Prospectus 2026",
      admissionInfo: "Admissions are open for the new academic session. Students can enquire, collect the prospectus, and complete registration after counselling.",
      admissionSteps: "Submit enquiry form\nAttend counselling or demo class\nComplete registration with required documents",
      eligibility: "Previous class marksheet\nStudent Aadhaar or ID proof\nTwo passport size photographs",
      admissionFormLink: "https://forms.gle/example-admission-form",
      prospectusData: "",
      prospectusName: "prospectus.pdf",
      logoData: "",
      heroData: ""
    };

    const state = { ...defaults };
    const fieldIds = [
      "name", "tagline", "headline", "primaryColor", "accentColor", "courses",
      "experience", "students", "results", "about", "features", "prospectusTitle",
      "admissionInfo", "admissionSteps", "eligibility", "admissionFormLink", "phone",
      "email", "address", "cta"
    ];

    const escapeHtml = (value) => String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");

    const lines = (value) => String(value || "")
      .split(/\r?\n/)
      .map((item) => item.trim())
      .filter(Boolean);

    const initials = (name) => {
      const parts = String(name || "Institute").trim().split(/\s+/).slice(0, 2);
      return parts.map((part) => part.charAt(0).toUpperCase()).join("") || "I";
    };

    function getSiteMarkup(data, standalone = false) {
      const courseCards = lines(data.courses).slice(0, 6).map((course) => `
        <article class="course-card">
          <h4>${escapeHtml(course)}</h4>
          <p>Focused lessons, practice sheets, and doubt clearing support.</p>
        </article>`).join("");

      const featureCards = lines(data.features).slice(0, 6).map((feature) => `
        <article class="info-card">
          <h4>${escapeHtml(feature)}</h4>
          <p>Designed to keep students consistent, confident, and exam ready.</p>
        </article>`).join("");

      const logo = data.logoData
        ? `<img class="brand-logo" src="${data.logoData}" alt="${escapeHtml(data.name)} logo">`
        : `<div class="brand-logo">${escapeHtml(initials(data.name))}</div>`;

      const hero = data.heroData
        ? `<img src="${data.heroData}" alt="${escapeHtml(data.name)} classroom">`
        : `<div class="placeholder-art">Learning space preview</div>`;

      const phoneLink = String(data.phone || "").replace(/[^\d+]/g, "");
      const email = String(data.email || "").trim();
      const admissionSteps = lines(data.admissionSteps).slice(0, 6).map((step) => `<li>${escapeHtml(step)}</li>`).join("");
      const eligibilityItems = lines(data.eligibility).slice(0, 6).map((item) => `<li>${escapeHtml(item)}</li>`).join("");
      const admissionLink = String(data.admissionFormLink || "").trim() || (phoneLink ? `tel:${phoneLink}` : "#contact");
      const prospectusLink = data.prospectusData ? `<a class="secondary-link" href="${data.prospectusData}" download="${escapeHtml(data.prospectusName || "prospectus.pdf")}">Download Prospectus</a>` : "";

      return `
        ${standalone ? "" : `<style>.site{--brand:${data.primaryColor};--brand-dark:${data.primaryColor};--accent:${data.accentColor};}</style>`}
        <header class="site-nav">
          <div class="brand-mark">
            ${logo}
            <div>
              <div class="brand-title">${escapeHtml(data.name)}</div>
              <div class="brand-small">${escapeHtml(data.tagline)}</div>
            </div>
          </div>
          <nav class="site-links" aria-label="Website sections">
            <a href="#courses">Courses</a>
            <a href="#about">About</a>
            <a href="#admission">Admission</a>
            <a href="#contact">Contact</a>
          </nav>
        </header>

        <section class="hero">
          <div>
            <h2>${escapeHtml(data.headline)}</h2>
            <p>${escapeHtml(data.tagline)}</p>
            <div class="hero-actions">
              <a class="site-cta" href="#admission">${escapeHtml(data.cta)}</a>
              <a class="site-cta alt" href="#courses">View Courses</a>
            </div>
            <div class="stats">
              <div class="stat"><strong>${escapeHtml(data.experience)}</strong><span>Experience</span></div>
              <div class="stat"><strong>${escapeHtml(data.students)}</strong><span>Students</span></div>
              <div class="stat"><strong>${escapeHtml(data.results)}</strong><span>Results</span></div>
            </div>
          </div>
          <div class="hero-media">${hero}</div>
        </section>

        <section class="band" id="courses">
          <h3>Courses</h3>
          <div class="cards">${courseCards || `<article class="course-card"><h4>Personal coaching</h4><p>Add your courses in the builder.</p></article>`}</div>
        </section>

        <section class="band tint" id="about">
          <h3>About</h3>
          <p style="max-width:760px;color:#4b5d75;line-height:1.65;margin:0 0 22px;">${escapeHtml(data.about)}</p>
          <div class="cards">${featureCards}</div>
        </section>

        <section class="band" id="admission">
          <h3>${escapeHtml(data.prospectusTitle)}</h3>
          <div class="admission-panel">
            <div class="admission-copy">
              <p>${escapeHtml(data.admissionInfo)}</p>
              <h4>Admission Steps</h4>
              <ul class="check-list">${admissionSteps || `<li>Contact the institute for admission details.</li>`}</ul>
            </div>
            <div class="admission-box">
              <h4>Prospectus & Form</h4>
              <p>Check eligibility, required documents, batches, and admission process before submitting the form.</p>
              <ul class="check-list">${eligibilityItems || `<li>Bring previous academic details and contact information.</li>`}</ul>
              <div class="admission-actions" style="margin-top:18px;">
                <a href="${escapeHtml(admissionLink)}" target="_blank" rel="noopener">Open Admission Form</a>
                ${prospectusLink}
              </div>
            </div>
          </div>
        </section>

        <section class="band" id="contact">
          <div class="contact">
            <div>
              <h3>Contact</h3>
              <div class="contact-list">
                <div><strong>Phone:</strong> ${escapeHtml(data.phone)}</div>
                <div><strong>Email:</strong> ${email ? `<a href="mailto:${escapeHtml(email)}">${escapeHtml(email)}</a>` : ""}</div>
                <div><strong>Address:</strong> ${escapeHtml(data.address)}</div>
              </div>
            </div>
            <div class="lead-box">
              <h4>Admissions Open</h4>
              <p>Share your class, subject, and preferred timing to get details.</p>
              <a href="${phoneLink ? `tel:${phoneLink}` : `mailto:${escapeHtml(email)}`}">${escapeHtml(data.cta)}</a>
            </div>
          </div>
        </section>

        <footer class="site-footer">
          <span>${escapeHtml(data.name)}</span>
          <span>${escapeHtml(data.phone)} ${email ? " | " + escapeHtml(email) : ""}</span>
        </footer>`;
    }

    function standaloneHtml(data) {
      return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${escapeHtml(data.name)}</title>
  <style>
${document.querySelector("style").textContent}
    :root {
      --brand: ${data.primaryColor};
      --brand-dark: ${data.primaryColor};
      --accent: ${data.accentColor};
    }
    body { background: #fff; }
    .site {
      max-width: none;
      margin: 0;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <main class="site">
${getSiteMarkup(data, true)}
  </main>
</body>
</html>`;
    }

    function render() {
      fieldIds.forEach((id) => {
        state[id] = document.getElementById(id).value;
      });
      document.documentElement.style.setProperty("--brand", state.primaryColor);
      document.documentElement.style.setProperty("--brand-dark", state.primaryColor);
      document.documentElement.style.setProperty("--accent", state.accentColor);
      document.getElementById("preview").innerHTML = getSiteMarkup(state);
    }

    function readFile(input, dataKey, nameKey) {
      const file = input.files && input.files[0];
      if (!file) {
        state[dataKey] = "";
        if (nameKey) state[nameKey] = defaults[nameKey] || "";
        render();
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        state[dataKey] = reader.result;
        if (nameKey) state[nameKey] = file.name;
        render();
      };
      reader.readAsDataURL(file);
    }

    function readImage(input, key) {
      readFile(input, key);
    }

    fieldIds.forEach((id) => {
      document.getElementById(id).addEventListener("input", render);
    });

    document.getElementById("logoFile").addEventListener("change", (event) => readImage(event.target, "logoData"));
    document.getElementById("heroFile").addEventListener("change", (event) => readImage(event.target, "heroData"));
    document.getElementById("prospectusFile").addEventListener("change", (event) => readFile(event.target, "prospectusData", "prospectusName"));

    document.getElementById("resetBtn").addEventListener("click", () => {
      Object.assign(state, defaults);
      fieldIds.forEach((id) => {
        document.getElementById(id).value = defaults[id];
      });
      document.getElementById("logoFile").value = "";
      document.getElementById("heroFile").value = "";
      document.getElementById("prospectusFile").value = "";
      render();
    });

    document.getElementById("downloadBtn").addEventListener("click", () => {
      render();
      const blob = new Blob([standaloneHtml(state)], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const fileName = String(state.name || "institute-website")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "") || "institute-website";
      link.href = url;
      link.download = `${fileName}.html`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    });

    render();
  </script>
</body>
</html>
